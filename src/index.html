<!doctype html>
<html ng-app='demoApp'>
	<head><title>Gaikai Demo</title>
		<script src='scripts/js/vendors/jquery.js'></script>
		<script src='scripts/js/angular/angular.js'></script>		
		<script src="scripts/js/angular/angular-route.js"></script>		
		<script src='scripts/js/demoController.js'></script>
		<link rel='stylesheet' href='css/main.css'>
		<link href='http://fonts.googleapis.com/css?family=Scada:400italic,700italic,400,700' rel='stylesheet' type='text/css'>
		
	</head>
	<body ng-controller='CatCtrl'>
	<header>Tanksley Tales: Gaikai quick demo
		<label>Sort Type:</label>
		<select ng-model="orderProp">
			<option value ='category'>Category</option>
			<option value ='name'>Recipe</option>			
		</select>
		</header>
		<div id="container">
			<div class="categories">
				<div class="content-module"ng-repeat="category in categories | filter:query | orderBy:orderProp">
				<h2>{{category.category}}</h2>
				<img ng-src="{{category.imageUrl}}" width=259 height= 172.5><p><h3>{{category.name}}</h3></p>
				</div>
			
			</div>
		</div>
		<footer> put some footer information here.</footer>
	</body>
	
	</html>
