<div class="row wrapper border-bottom white-bg page-heading">
    <div class="col-lg-10">
        <h2>Patients</h2>
        <ol class="breadcrumb">
            <li>
                <a href="index.html">Home</a>
            </li>
            <li>
                <a>App views</a>
            </li>
            <li class="active">
                <strong>Patients Demographics</strong>
            </li>
        </ol>
    </div>
    <div class="col-lg-2">

    </div>
</div>
<div class="wrapper wrapper-content animated fadeInRight" >	

	<div class="row">
        <div class="col-lg-4">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Patient Demographics
                        <small>click 'Update' to save changes.</small>
                    </h5>                   
                </div>
                <div class="ibox-content" >
                    <div class="row">
                        <div class="col-sm-6 b-r">
                            <form role="form">
                                <div class="form-group">
									<label>First</label> 
									<input type="text" placeholder="First Name" class="form-control" ng-model="patient.firstName" required>
								</div> 
								<div class="form-group">
									<label>Middle</label> 
									<input type="text" placeholder="Middle Name" class="form-control"ng-model="patient.middleName" >
								</div>
								<div class="form-group">
									<label>Last</label> 
									<input type="text" placeholder="Last Name" class="form-control" ng-model="patient.lastName" required>
								</div>
								<div class="form-group">
									<label>Birth Date</label>
										come back to this...
								</div>
								<div class="form-group">
									<label>SSN</label> 
									<input type="text" placeholder="SSN" class="form-control"ng-model="patient.ssn" >
								</div>
								<div class="form-group">
									<label>Sex</label> 
									<select ng-model="sex">
										<option value="Female">Female</option>
										<option value="Male">Male</option>								
									</select>
								</div>
								<div class="form-group">
									<label>Mother's First Name</label> 
									<input type="text" placeholder="Mother's First Name" class="form-control" ng-model="patient.mothersFirstName" >
								</div>
								<div class="form-group">
									<label>Mother's Maiden Name</label> 
									<input type="text" placeholder="Mother's Maiden Name" class="form-control" ng-model="patient.mothersMaidenName">
								</div>
                                <div>
                                    <button class="btn btn-sm btn-primary pull-right m-t-n-xs" type="submit" ng-click="update()"><strong>Update</strong></button>
								</div>
                            </form>

                        </div>                        
                    </div>
                </div>
            </div>
        </div>
		<div class="col-lg-4">
            <div class="ibox float-e-margins">
                <div class="ibox-title"><h3 class="m-t-none m-b"></h3></div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-sm-6 b-r">
                            <form role="form">
                                <div class="form-group">
									<label>Address 1</label> 
									<input type="text" placeholder="Street Address" class="form-control" ng-model="patient.address.streetAddress" required>
								</div> 
								<div class="form-group">
									<label>Address 2</label> 
									<input type="text" placeholder="Street Address 2" class="form-control"ng-model="patient.address.streetAddressTwo">
								</div>
								<div class="form-group">
									<label>City</label> 
									<input type="text" placeholder="City" class="form-control" ng-model="patient.address.city"required>
								</div>
								<div class="form-group">
									<label>State</label>
									<input type="text" placeholder="State" class="form-control" ng-model="patient.address.state"required>
								</div>
								<div class="form-group">
									<label>Zip</label>
									<input type="text" placeholder="Zip" class="form-control" ng-model="patient.address.zip"required>
								</div> 
								<div>
								<button type="button" class="btn btn-primary btn-sm btn-block" ng-click="$state.go('mailbox.email_compose',{patient: $rootScope.patient})"><i
													class="fa fa-envelope"></i> Send Message to PHR
								</button>
								</div>									
                            </form>

                        </div>                       
                    </div>
                </div>
            </div>
        </div>
		<div class="col-lg-4">
            <div class="ibox float-e-margins">
                <div class="ibox-title"><h3 class="m-t-none m-b"></h3></div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-sm-6 b-r">
                            <form role="form">
                                <div class="form-group">
									<label>Home Phone</label> 
									<input type="text" placeholder="Street Address" class="form-control" ng-model="patient.hphone" required>
								</div> 
								<div class="form-group">
									<label>Work Phone</label> 
									<input type="text" placeholder="Street Address 2" class="form-control"ng-model="patient.wphone">
								</div>
								<div class="form-group">
									<label>Mobile Phone</label> 
									<input type="text" placeholder="City" class="form-control" ng-model="patient.mphone"required>
								</div>
								<div class="form-group">
									<label>Email</label>
									<input type="text" placeholder="State" class="form-control" ng-model="patient.email"required>
								</div>
								<div class="form-group">
									<label>Contact Preference</label>
									<input type="text" placeholder="Zip" class="form-control" ng-model="patient.contactPreference"required>
								</div>                                
                            </form>

                        </div>                       
                    </div>
                </div>
            </div>
        </div>
	
	</div>
</div>
