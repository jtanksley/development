<div class="row wrapper border-bottom white-bg page-heading">
    <div class="col-lg-10">
        <h2>Patients</h2>
        <ol class="breadcrumb">
            <li>
                <a href="index.html">Home</a>
            </li>            
            <li class="active">
                <strong>Patients</strong>
            </li>
        </ol>
    </div>
    <div class="col-lg-2">

    </div>
</div>
<div class="wrapper wrapper-content  animated fadeInRight">
    <div class="row">
		<div class= "col-lg-12">
				<div class="col-lg-6">
					<div class="ibox">
						<div class="ibox-content"ng-controller="SearchCtrl">				
							<span class="text-muted small pull-right">Last modification: <i class="fa fa-clock-o"></i> {{today}}</span>
							<h2>Patients</h2>
							<p>
								All patients need to be verified before you can send email and set an encounter.
							</p>
							<div class="input-group">
								<input type="text" placeholder="Search Patient " name="searchField" class="input form-control" ng-model="keywords" ng-trim="true"><span id="clearSearch" class="animated fadeInRight clearSearch" ng-click="clearSearch()" ng-hide="keywords ==''" ><i class="fa fa-times-circle"></i></span>                               
											 <span class="input-group-btn">
											<button type="button" class="btn btn btn-primary" ng-click="search()" ng-disabled="keywords ==''"> <i class="fa fa-search"></i>Search</button>
										</span>	
								<span></span>
							</div>					
							<div class="clients-list">					 
								<ul class="nav nav-tabs">							
									<span class="pull-right small text-muted" ng-hide="resultCount == 0" > Last {{limit}} Patients Viewed</span>
									<li ng-class="{'active' : tab == 1}"><a ng-click="tab = 1" ng-init="tab = 1"><i class="fa fa-user"></i> {{tabTitle}}</a></li>                            
								</ul>                        
								<div id="tab-1" class="tab-pane active" ng-show="tab == 1">
									<div class="full-height-scroll" full-scroll>
										<div class="table-responsive">										
										   <patient-list></patient-list>									  
										</div>									
									</div>
								</div>                       
							</div>
						</div>
					</div>
				
			</div>
			<div class="col-lg-6" >
				<div class="ibox">
					<div class="ibox-content animated fadeInRight" ng-show="showThis">               
						<patient-detail></patient-detail>						
					</div>                  
				</div>
			</div>
		</div>
	</div>
</div>
