<div class="wrapper vitalsDetailMargins">
	<!-- Vitals Detail-->
	<dl class="dl-horizontal">

		<dt>Date Taken:</dt>
		<dd>{{patient.vitalsDetail.takenDate}}</dd>
		<dt>Weight:</dt>
		<dd> {{patient.vitalsDetail.weight}}</dd>
		<dt>Blood Pressure:</dt>
		<dd>{{patient.vitalsDetail.bloodPressure}}</dd>
		<dt>Pulse:</dt>
		<dd> {{patient.vitalsDetail.pulse}} {{patient.vitalsDetail.pulseType}}</dd>		
	</dl>
</div>
