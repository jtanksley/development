<div class="wrapper vitalsDetailMargins">
	<!-- Medications Detail-->
	<dl class="dl-horizontal">
		<dt>Date:</dt>
		<dd>{{patient.medicationDetail.startDate}}</dd>
		<dt>Prescribed By:</dt>
		<dd> {{patient.medicationDetail.prescribedBy}}</dd>
		<dt>Medication:</dt>
		<dd>{{patient.medicationDetail.medication}} {{patient.medicationDetail.dosage}}</dd>
		<dt>Sig:</dt>
		<dd>{{patient.medicationDetail.sig}}</dd>		
	</dl>
</div>
