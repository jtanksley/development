<table class="table table-striped table-hover">
	<thead>
	<th colspan="2" >Patient Name</th>
	<th colspan="2">Email</th>
	<th colspan="3">Last Visit</th>							
	</thead>
	<tbody>
		<tr ng-repeat="patient in patients | limitTo: 10 track by $index" ng-show="patients.length > 0">													
			<td class="client-avatar"><img alt="image" src="{{patient.avatar}}"></td>		
			<td><a href="" ng-click="selectPatient($index)" ng-dblclick= "viewChart()" class="client-link">{{patient.firstName}} {{patient.lastName}}</a></td>
			<td class="contact-type"><i class="fa fa-envelope"></i></td>						
			<td>{{patient.email}}</td>
			<td>{{patient.lastViewed}}</td>											
			
		</tr>
		<tr ng-hide="patients.length> 0"><td colspan= "7"><div class="alert alert-warning" role="alert" >No patients found.</div></td></tr>
	</tbody>
</table>
