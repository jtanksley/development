<div class= "wrapper">
	<!-- Vitals Form -->
	<div class="ibox float-e-margins">
		<div class="ibox-title">
			<h5>Current Vitals</h5>
			<div ibox-tools></div>
		</div>
		<div class="ibox-content">
			<form class="form-horizontal">
				<div class="form-group"><label class="col-lg-2 control-label">Date</label>

					<div class="col-lg-3"><input type="text" placeholder="Date" class="form-control" ng-model="patient.vitalsDetail.takenDate">
					</div>
				</div>
				<div class="form-group"><label class="col-lg-2 control-label">Weight</label>
					
					<div class="col-lg-6">
					<div class="row">
						<div class = "col-lg-3">
					<input type="text" placeholder="Weight" class="form-control" ng-model="patient.vitalsDetail.weight">
						</div>
						<div class = "col-lg-3">
					<input type="text" placeholder="" class="form-control" ng-model="patient.vitalsDetail.weightType">
						</div>
					</div>
					</div>
				</div>
				<div class="form-group"><label class="col-lg-2 control-label">Pulse</label>

					<div class="col-lg-6">
					<div class="row">
						<div class = "col-lg-3">
					<input type="text" placeholder="Pulse" class="form-control" ng-model="patient.vitalsDetail.pulse">
						</div>
						<div class = "col-lg-3">
					<input type="text" placeholder="" class="form-control" ng-model="patient.vitalsDetail.pulseType">
						</div>
					</div>
					</div>
				</div>
				<div class="form-group"><label class="col-lg-2 control-label">BP</label>

					<div class="col-lg-3"><input type="text" placeholder="BP" class="form-control"ng-model="patient.vitalsDetail.bloodPressure">					
					</div>
				</div>
				<div class="form-group">
					<div class="col-lg-offset-2 col-lg-10">
						<button class="btn btn-sm btn-white" type="button" ng-click="add()">Add Vitals</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
